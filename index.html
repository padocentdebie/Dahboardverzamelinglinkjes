<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Collector - Firebase</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eceff1; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        
        .input-section { display: grid; grid-template-columns: 1fr 1fr 100px auto; gap: 10px; margin-bottom: 40px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input, select, button { padding: 12px; border: 1px solid #dadce0; border-radius: 6px; font-size: 14px; }
        button { background-color: #1a73e8; color: white; cursor: pointer; border: none; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #1557b0; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .column { background: #fff; border: 1px solid #e0e0e0; padding: 15px; border-radius: 8px; min-height: 200px; }
        h2 { border-bottom: 3px solid #1a73e8; padding-bottom: 8px; color: #1a73e8; font-size: 1.2rem; margin-top: 0; }
        
        ul { list-style: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        li:last-child { border-bottom: none; }
        a { color: #1a73e8; text-decoration: none; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        a:hover { text-decoration: underline; }
        
        .delete-btn { color: #d93025; cursor: pointer; font-size: 12px; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>AangifteBotje Link Overzicht</h1>

    <div class="input-section">
        <input type="text" id="linkName" placeholder="Titel (bijv. Tool X)">
        <input type="url" id="linkUrl" placeholder="URL (https://...)">
        <select id="quarterSelect">
            <option value="Q1">Q1</option>
            <option value="Q2">Q2</option>
            <option value="Q3">Q3</option>
            <option value="Q4">Q4</option>
        </select>
        <button id="addBtn">Toevoegen</button>
    </div>

    <div class="grid">
        <div class="column"><h2>Q1</h2><ul id="list-Q1"></ul></div>
        <div class="column"><h2>Q2</h2><ul id="list-Q2"></ul></div>
        <div class="column"><h2>Q3</h2><ul id="list-Q3"></ul></div>
        <div class="column"><h2>Q4</h2><ul id="list-Q4"></ul></div>
    </div>
</div>

<script type="module">
    // Firebase SDK modules importeren via CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Jouw configuratie
    const firebaseConfig = {
        apiKey: "AIzaSyBEod8zm1jvvkmPbe6cA_SQo2U_esC9yTY",
        authDomain: "aangiftebotje.firebaseapp.com",
        databaseURL: "https://aangiftebotje-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangiftebotje",
        storageBucket: "aangiftebotje.firebasestorage.app",
        messagingSenderId: "825633841222",
        appId: "1:825633841222:web:15d93d08e2b719285dea47"
    };
// --- NIEUWE FUNCTIE: Kopieer huidige URL en vul titel in ---
const autoFillBtn = document.createElement('button');
autoFillBtn.innerText = "📍 Gebruik deze pagina";
autoFillBtn.style.backgroundColor = "#555";
autoFillBtn.style.marginBottom = "10px";

// Voeg de knop toe boven de input sectie
document.querySelector('.input-section').before(autoFillBtn);

autoFillBtn.addEventListener('click', () => {
    // Pakt de huidige URL van de browserbalk
    const currentUrl = window.location.href;
    const currentTitle = document.title;

    // Vult de velden direct voor je in
    document.getElementById('linkUrl').value = currentUrl;
    document.getElementById('linkName').value = currentTitle;
    
    // Optioneel: kopieer ook naar klembord
    navigator.clipboard.writeText(currentUrl);
    console.log("URL gekopieerd: " + currentUrl);
});
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const linksRef = ref(db, 'links');

    // Functie om link op te slaan
    document.getElementById('addBtn').addEventListener('click', () => {
        const name = document.getElementById('linkName').value;
        const url = document.getElementById('linkUrl').value;
        const quarter = document.getElementById('quarterSelect').value;

        if (name && url) {
            push(linksRef, {
                name: name,
                url: url,
                quarter: quarter,
                timestamp: Date.now()
            });
            document.getElementById('linkName').value = '';
            document.getElementById('linkUrl').value = '';
        } else {
            alert("Vul alles in!");
        }
    });

    // Real-time luisteren naar wijzigingen in de database
    onValue(linksRef, (snapshot) => {
        // Maak lijsten eerst leeg
        document.querySelectorAll('ul').forEach(el => el.innerHTML = '');

        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                const list = document.getElementById('list-' + item.quarter);
                
                if (list) {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <a href="${item.url}" target="_blank">${item.name}</a>
                        <button class="delete-btn" data-id="${key}">✖</button>
                    `;
                    list.appendChild(li);
                }
            });

            // Verwijder-functionaliteit toevoegen
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const id = e.target.getAttribute('data-id');
                    remove(ref(db, 'links/' + id));
                };
            });
        }
    });
</script>

</body>
</html>
